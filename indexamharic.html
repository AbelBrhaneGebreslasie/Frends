<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hotel Food Menu</title>
  <style>
    .header-container {
      position: absolute;
      top: 10px;
      left: 80px;
      display: flex;
      gap: 20px;
      align-items: center;
      height: 50px;
    }

    .language-selector {
      position: relative;
      border-radius: 5px;
      padding: 5px;
      cursor: pointer;
      z-index: 100;
      background: white;
    }

    .developer-container {
      position: absolute;
      top: 10px;
      right: 20px;
      width: 50px;
      height: 50px;
      background-image: url('https://raw.githubusercontent.com/abelbrhanegebreslasie/Frends/main/image/AB5.jpg');
      background-size: cover;
      background-position: center;
      border-radius: 50%;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
      cursor: pointer;
      z-index: 100;
    }

    .welcome-container { margin-top: 70px; text-align: center; }
    h1 { font-size: 32px; margin-bottom: 0px; }
    
    .arabic-container {
      position: absolute;
      top: 20px;
      left: 20px;
      background-color: white;
      border-radius: 5px;
      padding: 5px;
      z-index: 100;
    }

    .search-container { margin: 20px; text-align: center; }
    #searchInput { padding: 10px; width: 80%; border-radius: 5px; border: 1px solid #ccc; }

    .section { margin: 20px; }
    .item { 
      display: flex; 
      align-items: center; 
      gap: 15px; 
      margin-bottom: 15px; 
      background: #f9f9f9; 
      padding: 10px; 
      border-radius: 10px;
      cursor: pointer;
    }
    .food-image img { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; }
    .fasting-label { color: white; background-color: green; padding: 2px 5px; border-radius: 3px; font-size: 12px; margin-left: 5px; }
  </style>
</head>

<body>
  <div class="arabic-container"><span>አማርኛ</span></div>

  <div class="header-container">
    <div class="language-selector" onclick="toggleLanguage()">
      <span id="language-text">English</span>
    </div>
  </div>

  <div class="developer-container" onclick="goToDeveloperPage()"></div>

  <div class="welcome-container">
    <h1>እንኳን ወደ ፕላኔት ሆቴል ሜኑ በደህና መጡ</h1>
  </div>

  <div class="search-container">
    <input type="text" id="searchInput" placeholder="ምግብ ይፈልጉ..." onkeyup="searchMenu()">
  </div>

  <!-- Breakfast Section -->
  <div class="section">
    <h2>🍳 ቁርስ</h2>
    <div class="item" data-name="እንቁላል">
      <div class="food-image"><img src="https://raw.githubusercontent.com/abelbrhanegebreslasie/Frends/main/image/ff.jpg"></div>
      <p><strong>እንቁላል -</strong> 65 ብር <span class="fasting-label">የ ፆም</span></p>
    </div>
    <div class="item" data-name="በርገር">
      <div class="food-image"><img src="https://raw.githubusercontent.com/AbelBrhaneGebreslasie/Frends/main/image/hh.jpg"></div>
      <p><strong>በርገር -</strong> 65 ብር</p>
    </div>
    <div class="item" data-name="ፓስታ">
      <div class="food-image"><img src="https://raw.githubusercontent.com/AbelBrhaneGebreslasie/Frends/main/image/kk.jpg"></div>
      <p><strong>ፓስታ -</strong> 65 ብር</p>
    </div>
    <div class="item" data-name="ላዛኛ">
      <div class="food-image"><img src="https://raw.githubusercontent.com/AbelBrhaneGebreslasie/Frends/main//image/qqq.jpg"></div>
      <p><strong>ላዛኛ -</strong> 65 ብር</p>
    </div>
  </div>

  <!-- Lunch Section -->
  <div class="section">
    <h2>🍝 ምሳ</h2>
    <div class="item" data-name="እንጀራ">
      <div class="food-image"><img src="https://raw.githubusercontent.com/AbelBrhaneGebreslasie/Frends/main//image/rr.jpg"></div>
      <p><strong>እንጀራ -</strong> 65 ብር</p>
    </div>
    <div class="item" data-name="ጥብስ">
      <div class="food-image"><img src="https://raw.githubusercontent.com/AbelBrhaneGebreslasie/Frends/main//image/uu.jpg"></div>
      <p><strong>ጥብስ -</strong> 65 ብር</p>
    </div>
  </div>

  <script>
    // NAVIGATION FIX: Click handler for every food item
    document.querySelectorAll('.item').forEach(item => {
      item.addEventListener('click', function() {
        const img = this.querySelector('img').src;
        window.location.href = `indexamharic2.html?image=${encodeURIComponent(img)}`;
      });
    });

    function searchMenu() {
      let input = document.getElementById('searchInput').value.toLowerCase();
      let items = document.querySelectorAll('.item');
      items.forEach(item => {
        let name = item.getAttribute('data-name').toLowerCase();
        item.style.display = name.includes(input) ? "flex" : "none";
      });
    }

    function toggleLanguage() {
      window.location.href = "index.html"; // Redirect to English
    }

    function goToDeveloperPage() {
      window.location.href = "developeramharic.html";
    }
  </script>
</body>
</html>
