<!DOCTYPE html>
<html lang="am">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ዝርዝር መረጃ</title>
  <link rel="icon" href="https://raw.githubusercontent.com/AbelBrhaneGebreslasie/Frends/main/image/Ab_All_Logo.png" type="image/png">
  <style>
    body {
      margin: 0; padding: 20px;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, white, rgb(3, 189, 252));
      display: flex; flex-direction: column; align-items: center;
    }
    .image-container {
      width: 250px; height: 250px;
      border-radius: 50%; border: 5px solid white;
      overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.2);
      margin-bottom: 20px;
    }
    .image-container img { width: 100%; height: 100%; object-fit: cover; }
    
    h4 { color: #003366; font-size: 24px; margin: 10px 0; width: 100%; max-width: 500px; }
    ul { width: 100%; max-width: 500px; font-size: 18px; line-height: 1.6; }
    
    .back-btn {
      margin-top: 30px;
      padding: 12px 25px;
      background-color: #003366;
      color: white;
      border-radius: 8px;
      text-decoration: none;
      cursor: pointer;
      font-size: 18px;
    }
    .back-btn:hover { background-color: #0055aa; }
  </style>
</head>
<body>

  <div class="image-container">
    <img id="dish-image" src="" alt="Food">
  </div>

  <h4><u>አስፈላጊ ጥሬ ዕቃዎች (Ingredients)</u></h4>
  <ul id="ingredients-list"></ul>

  <div class="back-btn" onclick="location.href='indexamharic.html'">ወደ ዋናው ገጽ ይመለሱ</div>

  <script>
    const ingredientsData = {
      "https://raw.githubusercontent.com/abelbrhanegebreslasie/Frends/main/image/ff.jpg": ["እንቁላል", "ጨው", "ቅቤ"],
      "https://raw.githubusercontent.com/AbelBrhaneGebreslasie/Frends/main/image/hh.jpg": ["ስጋ", "ዳቦ", "ቺዝ", "ሰላጣ"],
      "https://raw.githubusercontent.com/AbelBrhaneGebreslasie/Frends/main/image/kk.jpg": ["ፓስታ", "ውሃ", "ጨው"],
      "https://raw.githubusercontent.com/AbelBrhaneGebreslasie/Frends/main//image/qqq.jpg": ["ላዛኛ ሉህ", "ስጋ", "ቺዝ"],
      "https://raw.githubusercontent.com/AbelBrhaneGebreslasie/Frends/main//image/rr.jpg": ["ዱቄት", "ውሃ", "እርሾ"],
      "https://raw.githubusercontent.com/AbelBrhaneGebreslasie/Frends/main//image/uu.jpg": ["ስጋ", "ሽንኩርት", "ቃሪያ"],
      "https://raw.githubusercontent.com/AbelBrhaneGebreslasie/Frends/main//image/hhh.jpg": ["ምስር", "ጎመን", "አትክልት"],
      "https://raw.githubusercontent.com/AbelBrhaneGebreslasie/Frends/main//image/pp.jpg": ["ሽሮ", "ሽንኩርት", "ቅመም"],
      "https://raw.githubusercontent.com/AbelBrhaneGebreslasie/Frends/main//image/sss.jpg": ["ውሃ", "ስኳር"],
      "https://raw.githubusercontent.com/AbelBrhaneGebreslasie/Frends/main//image/tt.jpg": ["ንፁህ ወተት"],
      "https://raw.githubusercontent.com/AbelBrhaneGebreslasie/Frends/main//image/ggg.jpg": ["ቾከሌት", "ዱቄት", "ስኳር"],
      "https://raw.githubusercontent.com/AbelBrhaneGebreslasie/Frends/main//image/rrr.jpg": ["ስትሮበሪ", "ክሬም"]
    };

    const params = new URLSearchParams(window.location.search);
    const imageUrl = params.get('image');

    if (imageUrl) {
      document.getElementById('dish-image').src = imageUrl;
      const ingredients = ingredientsData[imageUrl] || ["ዝርዝር አልተገኘም (No details found)"];
      const listContainer = document.getElementById('ingredients-list');
      listContainer.innerHTML = ""; 

      ingredients.forEach(item => {
        const li = document.createElement('li');
        li.textContent = item;
        listContainer.appendChild(li);
      });
    }

    function goBackHome() {
      window.location.href = 'indexamharic.html';
    }
  </script>
</body>
</html>
